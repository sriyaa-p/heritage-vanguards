services:
  postgres:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file: .env
    ports:
      - "8000:8000"   # Exposed so http://localhost:3000 frontend can reach the API directly
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ENV: ${ENV:-development}
    volumes:
      - ./backend:/app
      - ./data:/data
      - ./tests:/app/tests
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"   # Exposed so developers can access http://localhost:3000 directly
    environment:
      # NEXT_PUBLIC_API_URL intentionally omitted — api.ts fallback logic handles both:
      #   - http://localhost:3000  → API calls go to http://localhost:8000 (direct, no TLS)
      #   - https://localhost      → API calls go to https://localhost (via Nginx, no Mixed Content)
      NODE_ENV: production
    depends_on:
      - backend

  cert-generator:
    image: alpine/openssl
    volumes:
      - certs:/certs
    command: >
      sh -c "
        if [ ! -f /certs/localhost.crt ]; then
          openssl req -x509 -nodes -days 365 -newkey rsa:2048
            -keyout /certs/localhost.key
            -out /certs/localhost.crt
            -subj '/CN=localhost';
          echo 'Certificates generated.';
        else
          echo 'Certificates already exist, skipping.';
        fi
      "
    restart: "no"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certs:/etc/nginx/certs:ro
    depends_on:
      cert-generator:
        condition: service_completed_successfully
      frontend:
        condition: service_started
      backend:
        condition: service_started

volumes:
  postgres_data:
  certs: